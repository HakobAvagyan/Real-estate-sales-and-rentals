spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  liquibase:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none

system:
  upload:
    images:
      directory:
        path: ./target/test-images

jwt:
  secret: test-secret-test-secret-test-secret-test
  expiration: 3600000
