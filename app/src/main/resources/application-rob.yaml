spring:
  application:
    name: rent-sell
  liquibase:
      change-log: classpath:/db/master.xml
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/rent_sell
    username: ${DB_USERNAME:root}
  mail:
    host: smtp.gmail.com
    port: 587
    username: java2026java@gmail.com
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB
server:
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
    max-part-count: -1

logging:
  file:
    name: logs/app.log
  logback:
    rollingpolicy:
      max-file-size: 20MB
      max-history: 7

system:
  upload:
    images:
      directory:
        path: /Users/admin/Desktop/Real-estate-sales-and-rentals/app/upload-images/