<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verification | Real Estate Hub</title>
</head>
<body>
<main class="layout">
  <section class="panel">
    <div class="text-center">
      <div class="headline">&#9993;</div>
      <h1 class="headline">Email Verification</h1>
      <p class="subline">Please use the verification code below to complete your registration</p>
    </div>

    <div class="text-center">
      <div class="code-box">
        <span class="verification-code" th:text="${code}"></span>
      </div>
    </div>

    <div class="text-center">
      <hr class="divider">
      <p class="subline mb-0">
        If you did not request this code, you can safely ignore this email.
      </p>
    </div>
  </section>
</main>
</body>
</html>
