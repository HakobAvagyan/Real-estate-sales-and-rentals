<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="#{page.verificationMail.title}">Email Verification</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f6f9;
      font-family: Arial, Helvetica, sans-serif;
    }

    .layout {
      width: 100%;
      padding: 40px 0;
      display: flex;
      justify-content: center;
    }

    .panel {
      width: 100%;
      max-width: 500px;
      background: #ffffff;
      border-radius: 12px;
      padding: 40px 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }

    .headline {
      font-size: 28px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 10px;
    }

    .subline {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .code-box {
      display: inline-block;
      padding: 18px 30px;
      background: #f3f4f6;
      border-radius: 10px;
      margin: 20px 0;
      border: 1px dashed #d1d5db;
    }

    .verification-code {
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 6px;
      color: #111827;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 25px 0;
    }

    .mb-0 {
      margin-bottom: 0;
    }
  </style>
</head>

<body>
<main class="layout">
  <section class="panel">

    <div class="text-center">
      <div class="headline">✉️ Email Verification</div>
      <p class="subline">Please use the verification code below to complete your registration</p>
    </div>

    <div>
      <div class="code-box">
        <span class="verification-code" th:text="${code}"></span>
      </div>
    </div>

    <hr class="divider">

    <p class="subline mb-0">
      If you did not request this code, you can safely ignore this email.
    </p>

  </section>
</main>
</body>
</html>
