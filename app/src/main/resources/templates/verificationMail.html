<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verification | Real Estate Hub</title>
<!--  <link rel="stylesheet" th:href="@{/css/style.css}">-->
</head>
<body>
<main class="layout">
  <section class="panel">
    <div style="text-align: center; margin-bottom: 24px;">
      <div style="font-size: 48px; margin-bottom: 12px; color: var(--accent);">&#9993;</div>
      <h1 class="headline">Email Verification</h1>
      <p class="subline">Please use the verification code below to complete your registration</p>
    </div>

    <div style="text-align: center; margin: 32px 0;">
      <div style="display: inline-block; padding: 24px 32px; background: var(--accent-light); border: 2px dashed var(--border-mid); border-radius: var(--radius-sm);">
        <span th:text="${code}" style="font-size: 36px; font-weight: 700; letter-spacing: 8px; color: var(--accent-h); font-family: 'Courier New', monospace; display: inline-block;"></span>
      </div>
    </div>

    <div style="text-align: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);">
      <p style="margin: 0; color: var(--muted); font-size: 0.875rem; line-height: 1.6;">
        If you did not request this code, you can safely ignore this email.
      </p>
    </div>

    <div class="actions" style="justify-content: center; margin-top: 32px;">
<!--      <a class="btn btn-primary" th:href="@{/home}">Go to Home</a>-->
    </div>
  </section>
</main>
</body>
</html>
