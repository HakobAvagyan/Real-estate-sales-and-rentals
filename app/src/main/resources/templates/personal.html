<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.personal.title}">Personal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/animations.css}">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>
<main class="layout">
    <section class="panel" data-reveal>
        <h1 class="headline" th:text="#{personal.headline}">Profile</h1>
        <p class="subline" th:text="#{personal.subline}">Personal data and account actions.</p>

        <div class="actions mt-0">
            <img class="profile-avatar"
                 th:if="${user.getPicName() != null && !user.getPicName().equals('')}"
                 th:src="@{/image/get(pic=${user.picName})}" th:alt="#{personal.avatar.alt}">
            <img class="profile-avatar"
                 th:if="${user.getPicName() == null || user.getPicName().equals('')}"
                 th:src="@{/image/img.png}" th:alt="#{personal.avatar.alt}">
        </div>

        <hr class="divider">
        <dl class="kv-list">
            <dt th:text="#{personal.field.name}">Name</dt>
            <dd th:text="${user.name}"></dd>
            <dt th:text="#{personal.field.surname}">Surname</dt>
            <dd th:text="${user.surname}"></dd>
            <dt th:text="#{personal.field.phone}">Phone</dt>
            <dd th:text="${user.phone}"></dd>

            <th:block th:if="${ownProfile}">
                <dt th:text="#{pwd.email}">Email</dt>
                <dd th:text="${user.email}"></dd>
                <dt th:text="#{register.field.birthDate}">Birthday</dt>
                <dd th:text="${user.birthDate}"></dd>
                <dt th:text="#{register.field.passport}">Passport Details</dt>
                <dd th:text="${user.passportDetails}"></dd>
                <dt th:text="#{personal.field.role}">Role</dt>
                <dd th:text="${user.role}"></dd>
                <dt th:text="#{personal.field.registered}">Registered</dt>
                <dd th:text="${user.createdAt}"></dd>
            </th:block>
        </dl>

        <p class="muted" th:if="${ownProfile == false}" th:text="#{personal.publicNote}">Public profile — photo, name and phone only.</p>

        <div class="actions">
            <a class="btn btn-ghost" th:href="@{/home}" th:text="#{btn.back}">Back</a>
            <a class="btn btn-ghost" th:if="${ownProfile}" th:href="@{/update(id=${user.id})}" th:text="#{personal.edit}">Edit Profile</a>
            <a class="btn btn-danger" th:if="${ownProfile and user.getRole() != role}" th:href="@{/delete(id=${user.id})}" th:text="#{personal.delete}">Delete</a>
            <a class="btn btn-ghost" th:if="${ownProfile}" th:href="@{/verify/password}" th:text="#{personal.changePassword}">Change Password</a>
            <a class="btn btn-primary btn-sm" th:if="${currentUser != null && currentUser.id != user.id}"
               th:href="@{/messages/open/direct(otherUserId=${user.id})}" th:text="#{personal.message}">Message</a>
        </div>
    </section>
</main>
<div th:replace="~{fragments/chatWidgets :: supportFab}"></div>

<script defer th:src="@{/js/ui.js}"></script>
<script defer th:src="@{/js/animations.js}"></script>
</body>
</html>
