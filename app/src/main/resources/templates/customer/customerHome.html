<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard | Real Estate Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="layout">
    <section class="panel welcome">
        <div class="nav">
            <div>
                <p class="welcome" th:text="${currentUser.name + ' ' + currentUser.surname}"></p>
                <h1 class="headline">Customer Dashboard</h1>
                <p class="subline" style="margin-bottom:0">Browse and manage your property inquiries.</p>
            </div>
            <div class="actions" style="margin-top:0">
                <a class="btn btn-ghost btn-sm" href="/logout">Logout</a>
            </div>
        </div>
    </section>

    <section>
        <div>
            <a th:href="@{/personalPage(id=${currentUser.id})}">MY personal page</a>
        </div>
    </section>

</main>
</body>
</html>
