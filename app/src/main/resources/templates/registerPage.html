<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Real Estate Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="layout">
    <section class="panel">
        <h1 class="headline">Create Account</h1>
        <p class="subline">Add your profile to access platform operations.</p>

        <div class="alert alert-error" th:if="${msg} != null" th:text="${msg}"></div>

        <form method="post" action="/register" enctype="multipart/form-data">
            <div class="grid">
                <div class="field">
                    <label for="name">Name</label>
                    <input id="name" type="text" name="name" placeholder="First name" required>
                </div>
                <div class="field">
                    <label for="surname">Surname</label>
                    <input id="surname" type="text" name="surname" placeholder="Last name" required>
                </div>
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="field">
                    <label for="phone">Phone</label>
                    <input id="phone" type="tel" name="phone" placeholder="+374 ..." required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="Create password" required>
                </div>
                <div class="field">
                    <label for="birthDate">Birth Date</label>
                    <input id="birthDate" type="date" name="birthDate" placeholder="YYYY-MM-DD" required>
                </div>
                <div class="field">
                    <label for="passportDetails">Passport Detail</label>
                    <input id="passportDetails" type="text" name="passportDetails" placeholder="Passport number">
                </div>
                <div class="field row-full">
                    <label for="pic">Profile Picture</label>
                    <input id="pic" type="file" name="pic">
                </div>
                <div class="field row-full">
                    <label>Gender</label>
                    <div class="role-group">
                        <label class="role-group"><input type="radio" name="gender" value="MALE"> Male</label>
                        <label class="role-group"><input type="radio" name="gender" value="FEMALE"> Female</label>
                    </div>
                </div>
                <div class="field row-full">
                    <label>Role</label>
                    <div class="role-group">
                        <label class="role-option"><input type="radio" name="role" value="USER"> User</label>
                        <label class="role-option"><input type="radio" name="role" value="CUSTOMER"> Customer</label>
                    </div>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit">Register</button>
                <a class="btn btn-ghost" href="/">Back to Login</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
