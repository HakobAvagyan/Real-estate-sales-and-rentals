<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Property | Real Estate Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="layout">

    <section class="panel welcome">
        <div class="nav">
            <div>
                <h1 class="headline">Book Property</h1>
                <p class="subline mb-0">Choose your stay dates and number of guests.</p>
            </div>
            <div class="actions mt-0">
                <a class="btn btn-ghost btn-sm" href="/home">Back</a>
            </div>
        </div>
    </section>

    <section class="panel">
        <p class="property-summary-title" th:text="${property.title}"></p>
        <p class="property-summary-type" th:text="${property.propertyType}"></p>
        <p class="property-summary-price">
            Price per night:
            <strong th:text="'$' + ${#numbers.formatDecimal(property.price, 0, 'COMMA', 0, 'POINT')}"></strong>
        </p>
    </section>

    <section class="panel">
        <form method="post" action="/booking/checkout">
            <input type="hidden" name="propertyId" th:value="${property.id}">
            <input type="hidden" name="propertyTitle" th:value="${property.title}">

            <div class="grid">
                <div class="field">
                    <label for="startDate">Check-in date</label>
                    <input id="startDate" name="startDate" type="date" required>
                </div>
                <div class="field">
                    <label for="endDate">Check-out date</label>
                    <input id="endDate" name="endDate" type="date" required>
                </div>
                <div class="field">
                    <label for="guests">Number of guests</label>
                    <input id="guests" name="guests" type="number" min="1" value="1" required>
                </div>
                <div class="field">
                    <label>Total amount</label>
                    <input id="totalDisplay" type="text" readonly value="—">
                    <input id="amountHidden" name="amount" type="hidden" value="0">
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Proceed to Payment</button>
            </div>
        </form>
    </section>

    <div th:replace="~{fragments/chatWidgets :: supportFab}"></div>
</main>

<script th:inline="javascript">
    const pricePerNight = /*[[${property.price}]]*/ 0;

    function recalc() {
        const start = document.getElementById('startDate').value;
        const end   = document.getElementById('endDate').value;
        const amountInput = document.getElementById('amountHidden');
        const display     = document.getElementById('totalDisplay');
        if (!start || !end) { display.value = '—'; amountInput.value = '0'; return; }
        const days = Math.max(0, (new Date(end) - new Date(start)) / 86400000);
        if (days <= 0) { display.value = '—'; amountInput.value = '0'; return; }
        const total = (pricePerNight * days).toFixed(2);
        display.value = '$' + parseFloat(total).toLocaleString('en-US');
        amountInput.value = total;
    }

    document.getElementById('startDate').addEventListener('change', function () {
        document.getElementById('endDate').min = this.value;
        recalc();
    });
    document.getElementById('endDate').addEventListener('change', recalc);
</script>
</body>
</html>
