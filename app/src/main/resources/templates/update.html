<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update User Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="layout">
  <section class="panel">
    <h1 class="headline">Update User Details</h1>
    <p class="subline">Edit profile information and media for this account.</p>

    <form method="post" action="/update" enctype="multipart/form-data">
      <input type="hidden" name="id" th:value="${user.id}">

      <div class="grid">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" type="text" name="name" th:value="${user.name}" required>
        </div>
        <div class="field">
          <label for="surname">Surname</label>
          <input id="surname" type="text" name="surname" th:value="${user.surname}" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" th:value="${user.email}" required>
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" type="tel" name="phone" th:value="${user.phone}">
        </div>
        <input id="birthDate" type="date" name="birthDate" th:value="${user.birthDate}"  required>
        <div class="field">
          <label for="passportDetails">Passport Detail</label>
          <input id="passportDetails" type="text" name="passportDetails" th:value="${user.passportDetails}">
        </div>
        <div class="field row-full">
          <label for="pic">Profile Picture</label>
          <input id="pic" type="file" name="pic">
        </div>
        <div class="field row-full" th:if="${user.picName != null}">
          <a th:href="@{/remove/user/picture(id=${user.id})}">Remove profile picture</a>
        </div>
        <div class="field row-full">
          <label>Role</label>
          <input type="hidden" name="role" th:value="${user.role}">
          <input type="text" th:value="${user.role}" readonly>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Save Changes</button>
        <a class="btn btn-ghost" href="/home">Back to User List</a>
      </div>
    </form>
  </section>
</main>
</body>
</html>
