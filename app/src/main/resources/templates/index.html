<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Real Estate Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="layout">
    <section class="panel">
        <div class="hero">
            <span class="icon">🏡</span>
            <h1 class="headline">Real Estate Hub</h1>
            <p class="subline">Sales and rentals platform for professionals.</p>
            <div class="actions">
                <a class="btn btn-primary" href="/loginPage">Sign In</a>
                <a class="btn btn-ghost" href="/register">Create Account</a>
            </div>
        </div>
    </section>

    <section class="panel wide">
        <div class="page-header">
            <div>
                <h2 class="headline">Available Properties</h2>
                <p class="subline mb-0">All current products from the database.</p>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(properties)}">
            <p>No properties found.</p>
        </div>
        <div class="table-wrap" th:if="${!#lists.isEmpty(properties)}">
            <table>
                <thead>
                <tr>
                    <th>Image</th>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Type</th>
                    <th>Location ID</th>
                    <th>Surface</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="property : ${properties}">
                    <td>
                        <img class="avatar"
                             th:if="${!#lists.isEmpty(property.imageUrls)}"
                             th:src="@{/image/get(pic=${property.imageUrls[0]})}"
                             alt="Property image">
                        <span th:if="${#lists.isEmpty(property.imageUrls)}">No image</span>
                    </td>
                    <td th:text="${property.title}"></td>
                    <td th:text="${property.price}"></td>
                    <td><span class="badge" th:text="${property.status}"></span></td>
                    <td th:text="${property.propertyType}"></td>
                    <td th:text="${property.locationId}"></td>
                    <td th:text="${property.surface}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
