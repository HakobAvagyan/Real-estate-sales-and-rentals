<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Own Notification</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="layout">
    <section class="panel">
        <h1 class="headline">Notification Details</h1>
        <p class="subline">Full notification text and metadata.</p>
        <hr class="divider">
        <h2 class="headline" th:text="${notification.title}"></h2>
        <p th:text="${notification.message}"></p>
        <div class="actions">
            <a class="btn btn-ghost" th:href="@{/notifications}">Back</a>
        </div>
    </section>
</main>
</body>
</html>
