<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Notifications</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="layout">
  <section class="panel welcome">
    <div class="nav">
      <div>
        <h1 class="headline">
          Notifications for <span th:text="${currentUser.name} + ' ' + ${currentUser.surname}"></span>
        </h1>
        <p class="subline mb-0">Your recent account updates and system messages.</p>
      </div>
      <div class="actions mt-0">
        <a class="btn btn-ghost btn-sm" th:href="@{/home}">Back</a>
        <a class="btn btn-ghost btn-sm" href="/logout">Logout</a>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="stack" th:if="${#lists.isEmpty(notifications)}">
      <p>No notifications yet.</p>
    </div>
    <div class="table-wrap" th:if="${!#lists.isEmpty(notifications)}">
      <table>
        <thead>
        <tr>
          <th>Title</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="notification : ${notifications}">
          <td th:text="${notification.title}"></td>
          <td th:text="${#temporals.format(notification.createdAt, 'yyyy-MM-dd')}"></td>
          <td>
            <a class="link-inline" th:href="@{/notifications/{id}(id=${notification.id})}">Open</a>
            <span>|</span>
            <a class="link-inline danger" th:href="@{/notifications/{id}/delete(id=${notification.id})}">Delete</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
</body>
</html>
