<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="site-header">
    <div class="site-header-inner">
        <a class="site-logo" href="/">🏡 Real Estate Hub</a>
        <nav class="site-nav">
            <th:block th:if="${currentUser != null}">
                <a class="site-user-link" th:href="${dashboardUrl}">
                    <span class="site-user-avatar" th:text="${#strings.substring(currentUser.name, 0, 1).toUpperCase()}"></span>
                    <span th:text="${currentUser.name + ' ' + currentUser.surname}"></span>
                </a>
            </th:block>
            <th:block th:if="${currentUser == null}">
                <a class="btn btn-ghost btn-sm" href="/loginPage">Sign In</a>
                <a class="btn btn-primary btn-sm" href="/register">Register</a>
            </th:block>
        </nav>
    </div>
</header>

<main class="catalog-layout">
    <div class="catalog-header">
        <h1 class="headline">Available Properties</h1>
        <p class="subline mb-0"
           th:text="${properties != null ? #lists.size(properties) + ' properties found' : ''}"></p>
    </div>

    <div th:if="${properties == null or #lists.isEmpty(properties)}" class="empty-state">
        <span class="empty-icon">🏠</span>
        <p>No properties found at the moment.</p>
    </div>

    <div class="prop-grid" th:if="${properties != null and !#lists.isEmpty(properties)}">
        <div class="prop-card" th:each="property : ${properties}">

            <div class="prop-card-img-wrap">
                <img class="prop-card-img"
                     th:if="${!#lists.isEmpty(property.imageUrls)}"
                     th:src="@{/image/get(pic=${property.imageUrls[0]})}"
                     alt="Property image">
                <div class="prop-card-img-placeholder"
                     th:if="${#lists.isEmpty(property.imageUrls)}">🏠</div>
                <span class="prop-card-status"
                      th:classappend="${property.status.name() == 'FOR_SALE' ? ' sale' : ' rent'}"
                      th:text="${property.status}"></span>
            </div>

            <div class="prop-card-body">
                <div class="prop-card-type" th:text="${property.propertyType}"></div>

                <div class="prop-card-location"
                     th:if="${locationMap != null and locationMap[property.locationId] != null}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    <span th:text="${locationMap[property.locationId].city
                        + (locationMap[property.locationId].district != null
                           ? ', ' + locationMap[property.locationId].district : '')}"></span>
                </div>

                <div class="prop-card-price"
                     th:text="'$' + ${#numbers.formatDecimal(property.price, 0, 'COMMA', 0, 'POINT')}"></div>

                <div class="prop-card-meta">
                    <span class="prop-card-meta-item" th:if="${property.roomsCount != null}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                        <span th:text="${property.roomsCount} + ' rm.'"></span>
                    </span>
                    <span class="prop-card-meta-item" th:if="${property.surface > 0}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        </svg>
                        <span th:text="${property.surface} + ' sq.m.'"></span>
                    </span>
                    <span class="prop-card-meta-item"
                          th:if="${property.floorCount != null and property.floorCount > 0}">
                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="2" x2="12" y2="22"/>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                        <span th:text="${property.floor} + '/' + ${property.floorCount} + ' fl.'"></span>
                    </span>
                </div>
            </div>

        </div>
    </div>
</main>

</body>
</html>
