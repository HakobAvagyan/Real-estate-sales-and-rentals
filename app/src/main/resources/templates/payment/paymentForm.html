<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | Real Estate Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>
<main class="layout">

    <section class="panel welcome">
        <div class="nav">
            <div>
                <h1 class="headline">Payment</h1>
                <p class="subline mb-0">Enter your card details to complete the payment.</p>
            </div>
            <div class="actions mt-0">
                <a class="btn btn-ghost btn-sm" href="/home">Cancel</a>
            </div>
        </div>
    </section>

    <section class="panel">
        <h2 class="headline">Order Summary</h2>

        <th:block th:if="${type == 'BOOKING'}">
            <p class="subline mb-0"><strong th:text="${propertyTitle}"></strong> — rental booking</p>
            <p class="order-summary-detail">
                <span th:text="${startDate}"></span> → <span th:text="${endDate}"></span>
                &nbsp;·&nbsp; <span th:text="${guests}"></span> guest(s)
            </p>
        </th:block>

        <th:block th:if="${type == 'URGENT'}">
            <p class="subline mb-0"><strong>Urgent Plan — 30 days</strong></p>
            <p class="order-summary-detail">Property: <span th:text="${propertyTitle}"></span></p>
            <p class="order-summary-note">Your listing will appear in the Urgent section on the home page.</p>
        </th:block>

        <div class="payment-total-box">
            <span class="payment-total-label">Total</span>
            <span class="payment-total-amount"
                  th:text="'$' + ${#numbers.formatDecimal(amount, 0, 'COMMA', 2, 'POINT')}"></span>
        </div>
    </section>

    <section class="panel">
        <h2 class="headline">Card Details</h2>
        <form method="post" action="/payment/confirm">
            <input type="hidden" name="type" th:value="${type}">
            <input type="hidden" name="propertyId" th:value="${propertyId}">
            <input type="hidden" name="amount" th:value="${amount}">
            <input type="hidden" name="startDate" th:value="${startDate}">
            <input type="hidden" name="endDate" th:value="${endDate}">
            <input type="hidden" name="guests" th:value="${guests}">
            <div class="grid">
                <div class="field row-full">
                    <label for="cardNumber">Card Number</label>
                    <input id="cardNumber" type="text" placeholder="1234 5678 9012 3456"
                           maxlength="19" autocomplete="cc-number" required>
                </div>
                <div class="field row-full">
                    <label for="cardHolder">Cardholder Name</label>
                    <input id="cardHolder" type="text" placeholder="JOHN DOE"
                           autocomplete="cc-name" required>
                </div>
                <div class="field">
                    <label for="expiry">Expiry (MM/YY)</label>
                    <input id="expiry" type="text" placeholder="MM/YY"
                           maxlength="5" autocomplete="cc-exp" required>
                </div>
                <div class="field">
                    <label for="cvv">CVV</label>
                    <input id="cvv" type="password" placeholder="•••"
                           maxlength="4" autocomplete="cc-csc" required>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit"
                        th:text="'Pay $' + ${#numbers.formatDecimal(amount, 0, 'COMMA', 2, 'POINT')}">Pay</button>
            </div>
        </form>
    </section>

    <div th:replace="~{fragments/chatWidgets :: supportFab}"></div>
</main>

<script>
    document.getElementById('cardNumber').addEventListener('input', function () {
        let val = this.value.replace(/\D/g, '').substring(0, 16);
        this.value = val.replace(/(.{4})/g, '$1 ').trim();
    });

    document.getElementById('expiry').addEventListener('input', function () {
        let val = this.value.replace(/\D/g, '').substring(0, 4);
        if (val.length > 2) val = val.substring(0, 2) + '/' + val.substring(2);
        this.value = val;
    });
</script>
</body>
</html>
