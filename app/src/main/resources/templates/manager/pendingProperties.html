<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{manager.pending.title}">Review listings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>
<main class="layout">
    <section class="panel welcome">
        <div class="nav">
            <div>
                <h1 class="headline" th:text="#{manager.pending.headline}">Listings pending review</h1>
                <p class="subline mb-0" th:text="#{manager.pending.subline}">Approve to publish on the site, or reject - the owner receives a notification.</p>
            </div>
            <div class="actions mt-0">
                <a class="btn btn-ghost btn-sm" th:href="@{/manager/home}" th:text="#{manager.pending.back}">Back to dashboard</a>
            </div>
        </div>
    </section>

    <div class="rating-flash rating-flash-ok" th:if="${moderationSuccess != null}" th:text="${moderationSuccess}"></div>
    <div class="rating-flash rating-flash-err" th:if="${moderationError != null}" th:text="${moderationError}"></div>

    <section class="panel wide">
        <p class="subline muted" th:if="${pendingProperties == null or pendingProperties.isEmpty()}">
            <span th:text="#{manager.pending.empty}">There are no listings waiting for approval.</span>
        </p>
        <div class="table-wrap" th:if="${pendingProperties != null and !pendingProperties.isEmpty()}">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th th:text="#{user.home.table.title}">Title</th>
                    <th th:text="#{manager.pending.table.owner}">Owner user ID</th>
                    <th th:text="#{user.home.table.type}">Type</th>
                    <th th:text="#{user.home.table.status}">Status</th>
                    <th th:text="#{user.home.table.price}">Price</th>
                    <th th:text="#{user.home.table.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${pendingProperties}">
                    <td th:text="${p.id}">0</td>
                    <td th:text="${p.title}">—</td>
                    <td th:text="${p.userId}">0</td>
                    <td th:with="typeKey=|enum.propertyType.${p.propertyType}|" th:text="#{__${typeKey}__}">—</td>
                    <td><span class="badge" th:with="statusKey=|enum.propertyStatus.${p.status}|"
                              th:text="#{__${statusKey}__}"></span></td>
                    <td th:text="${p.price}">0</td>
                    <td>
                        <a class="btn btn-sm btn-ghost" th:href="@{/property/details(propertyId=${p.id})}" th:text="#{manager.pending.action.preview}">Preview</a>
                        <form th:action="@{/manager/property/approve}" method="post" style="display:inline;">
                            <input type="hidden" name="propertyId" th:value="${p.id}"/>
                            <button type="submit" class="btn btn-sm btn-primary" th:text="#{manager.pending.action.approve}">Approve</button>
                        </form>
                        <form th:action="@{/manager/property/reject}" method="post" class="reject-inline-form">
                            <input type="hidden" name="propertyId" th:value="${p.id}"/>
                            <input type="text" name="reason" class="inp inp-sm reject-reason" maxlength="500"
                                   th:placeholder="#{manager.pending.reason.placeholder}"/>
                            <button type="submit" class="btn btn-sm btn-ghost danger" th:text="#{manager.pending.action.reject}">Reject</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
    <div th:replace="~{fragments/chatWidgets :: supportFab}"></div>
</main>
<style>
    .reject-inline-form { display: inline-flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-left: 8px; vertical-align: middle; }
    .inp-sm { max-width: 220px; font-size: .85rem; padding: 6px 8px; }
    .btn.danger { color: var(--danger); border-color: #fecdd3; }
</style>
</body>
</html>
