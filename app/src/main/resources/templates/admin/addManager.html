<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Manger</title>
</head>
<body>
<a href="/adminHome">Back to Admin Home</a>
<h1>Add Manager</h1>
<form method="post" action="/admin/add/manager" enctype="multipart/form-data">
  <div class="grid">
    <div class="field">
      <label for="name">Name</label>
      <input id="name" type="text" name="name" placeholder="First name" required>
    </div>
    <div class="field">
      <label for="surname">Surname</label>
      <input id="surname" type="text" name="surname" placeholder="Last name" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label for="phone">Phone</label>
      <input id="phone" type="tel" name="phone" placeholder="+374 ..." required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="Create password" required>
    </div>
    <div class="field">
      <label for="passportDetails">Passport Detail</label>
      <input id="passportDetails" type="text" name="passportDetails" placeholder="Passport number">
    </div>
    <div class="field row-full">
      <label for="pic">Profile Picture</label>
      <input id="pic" type="file" name="pic">
    </div>
  </div>
  <div class="actions">
    <button class="btn btn-primary" type="submit">Add Manager</button>
    <a class="btn btn-ghost" href="/">Back to Login</a>
  </div>
</form>
</body>
</html>
