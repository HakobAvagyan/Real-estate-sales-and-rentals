<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.addManager.title} + ' | Real Estate Hub'">Add Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/animations.css}">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>
<main class="layout">
    <section class="panel" data-reveal>
        <h1 class="headline" th:text="#{admin.addManager.title}">Add Manager</h1>
        <p class="subline" th:text="#{admin.addManager.subline}">Create a new manager account with platform access.</p>

        <form method="post" action="/admin/add/manager" enctype="multipart/form-data">
            <div class="grid">
                <div class="field">
                    <label for="name" th:text="#{register.field.name}">Name</label>
                    <input id="name" type="text" name="name" th:placeholder="#{register.placeholder.name}" required>
                </div>
                <div class="field">
                    <label for="surname" th:text="#{register.field.surname}">Surname</label>
                    <input id="surname" type="text" name="surname" th:placeholder="#{register.placeholder.surname}" required>
                </div>
                <div class="field">
                    <label for="email" th:text="#{pwd.email}">Email</label>
                    <input id="email" type="email" name="email" th:placeholder="#{register.placeholder.email}" required>
                </div>
                <div class="field">
                    <label for="phone" th:text="#{register.field.phone}">Phone</label>
                    <input id="phone" type="tel" name="phone" th:placeholder="#{register.placeholder.phone}" required>
                </div>
                <div class="field">
                    <label for="password" th:text="#{login.field.password}">Password</label>
                    <input id="password" type="password" name="password" th:placeholder="#{pwd.placeholder.new}" required>
                </div>
                <div class="field">
                    <label for="birthDate" th:text="#{register.field.birthDate}">Birth Date</label>
                    <input id="birthDate" type="date" name="birthDate" required>
                </div>
                <div class="field">
                    <label for="passportDetails" th:text="#{register.field.passport}">Passport Detail</label>
                    <input id="passportDetails" type="text" name="passportDetails" th:placeholder="#{register.placeholder.passport}">
                </div>
                <div class="field row-full">
                    <label for="pic" th:text="#{register.field.pic}">Profile Picture</label>
                    <input id="pic" type="file" name="pic">
                </div>
                <div class="field row-full">
                    <label th:text="#{register.field.gender}">Gender</label>
                    <div class="role-group">
                        <label class="role-option"><input type="radio" name="gender" value="MALE"> <span th:text="#{register.gender.male}">Male</span></label>
                        <label class="role-option"><input type="radio" name="gender" value="FEMALE"> <span th:text="#{register.gender.female}">Female</span></label>
                    </div>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit" th:text="#{admin.addManager.title}">Add Manager</button>
                <a class="btn btn-ghost" th:href="@{/admin/home}" th:text="#{btn.back}">Back</a>
            </div>
        </form>
    </section>
</main>

<script defer th:src="@{/js/ui.js}"></script>
<script defer th:src="@{/js/animations.js}"></script>
</body>
</html>
