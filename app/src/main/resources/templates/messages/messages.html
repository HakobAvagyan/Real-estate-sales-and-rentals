<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Real Estate Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="layout">
    <section class="panel wide">
        <div class="nav">
            <div>
                <h1 class="headline">Messages</h1>
                <p class="subline">Direct chats and support</p>
            </div>
            <div class="actions">
                <a class="btn btn-ghost btn-sm" href="/home">Home</a>
            </div>
        </div>
    </section>

    <div class="chat-shell panel wide">
        <aside class="chat-sidebar">
            <h2 class="chat-sidebar-title">Conversations</h2>
            <ul class="chat-conv-list">
                <li th:each="c : ${conversations}">
                    <a th:href="@{/messages(conversationId=${c.id})}"
                       th:classappend="${selectedConversationId != null && selectedConversationId == c.id} ? ' active'"
                       class="chat-conv-item">
                        <span class="chat-conv-name"
                              th:text="${c.conversationType.name() == 'SUPPORT' ? 'Support' : c.otherUserName}">Chat</span>
                        <span class="chat-conv-meta" th:if="${c.unreadCount > 0}" th:text="'(' + ${c.unreadCount} + ' new)'"></span>
                    </a>
                </li>
            </ul>
            <p class="muted" th:if="${#lists.isEmpty(conversations)}">No conversations yet.</p>
        </aside>
        <section class="chat-main" th:if="${selectedConversationId != null}">
            <div id="chat-page-config" hidden
                 th:data-selected-conversation-id="${selectedConversationId}"
                 th:data-current-user-id="${currentUserId}"></div>
            <div id="msg-list" class="chat-messages">
                <div th:each="m : ${messages}" class="chat-bubble-row" th:classappend="${m.senderId == currentUserId} ? ' mine'">
                    <div class="chat-bubble">
                        <div class="chat-meta" th:text="${m.senderName} + ' · ' + ${m.createdAt}">Sender</div>
                        <div class="chat-text" th:text="${m.text}">Text</div>
                    </div>
                </div>
            </div>
            <form class="chat-compose" th:action="@{/messages/send}" method="post">
                <input type="hidden" name="conversationId" th:value="${selectedConversationId}">
                <input type="text" name="text" placeholder="Type a message…" required maxlength="2000" class="chat-input">
                <button type="submit" class="btn btn-primary">Send</button>
            </form>
            <p class="chat-live muted" id="chat-live-hint">Live updates enabled (WebSocket).</p>
        </section>
        <section class="chat-main chat-empty" th:if="${selectedConversationId == null}">
            <p class="muted">Select a conversation or start a new chat from a profile.</p>
        </section>
    </div>
    <div th:replace="~{fragments/chatWidgets :: supportFab}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:src="@{/js/chat-messages.js}"></script>
</body>
</html>
