<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.messages.title}">Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/animations.css}">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>

<!-- Modern Chat UI Layout -->
<main class="chat-app-layout">
    <div class="chat-app-container" data-reveal>
        
        <!-- Sidebar: Conversations -->
        <aside class="chat-app-sidebar">
            <div class="chat-sidebar-header">
                <h1 class="chat-sidebar-headline" th:text="#{messages.headline}">Messages</h1>
                <a class="btn btn-ghost btn-sm chat-home-btn" th:href="@{/home}" th:text="#{btn.back}">Back</a>
            </div>
            
            <div class="chat-sidebar-list-wrap">
                <ul class="chat-conv-list">
                    <li th:each="c : ${conversations}">
                        <a th:href="@{/messages(conversationId=${c.id})}"
                           th:classappend="${selectedConversationId != null && selectedConversationId == c.id} ? ' active'"
                           class="chat-conv-item">
                            <div class="chat-conv-avatar">
                                <span th:text="${c.conversationType.name() == 'SUPPORT'} ? '💬' : ${#strings.substring(c.otherUserName, 0, 1).toUpperCase()}"></span>
                            </div>
                            <div class="chat-conv-info">
                                <span class="chat-conv-name"
                                      th:text="${c.conversationType.name() == 'SUPPORT'} ? #{messages.support} : ${c.otherUserName}">Chat</span>
                                <span class="chat-conv-meta" th:if="${c.unreadCount > 0}" th:text="#{messages.new(${c.unreadCount})}"></span>
                            </div>
                        </a>
                    </li>
                </ul>
                <div class="chat-empty-sidebar" th:if="${#lists.isEmpty(conversations)}">
                    <p class="muted" th:text="#{messages.empty}">No conversations yet.</p>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <section class="chat-app-main">
            <!-- If no conversation selected -->
            <div class="chat-main-empty" th:if="${selectedConversationId == null}">
                <div class="chat-empty-state">
                    <span class="chat-empty-icon">💬</span>
                    <p class="muted" th:text="#{messages.select}">Select a conversation to start messaging.</p>
                </div>
            </div>

            <!-- If conversation is selected -->
            <th:block th:if="${selectedConversationId != null}">
                <div class="chat-main-header">
                    <div class="chat-main-header-info">
                        <h2 class="chat-main-title">
                            <span th:each="c : ${conversations}" th:if="${c.id == selectedConversationId}" 
                                  th:text="${c.conversationType.name() == 'SUPPORT'} ? #{messages.support} : ${c.otherUserName}">Chat</span>
                        </h2>
                        <span class="chat-live-badge" id="chat-live-hint" th:title="#{messages.live}">Live</span>
                    </div>
                </div>

                <div id="chat-page-config" hidden
                     th:data-selected-conversation-id="${selectedConversationId}"
                     th:data-current-user-id="${currentUserId}"></div>
                
                <div id="msg-list" class="chat-messages-area">
                    <div th:each="m : ${messages}" class="chat-bubble-row" th:classappend="${m.senderId == currentUserId} ? ' mine'">
                        <div class="chat-bubble">
                            <div class="chat-text" th:text="${m.text}">Text</div>
                            <div class="chat-meta" th:text="${#strings.substring(m.createdAt, 11, 16)}">12:00</div>
                        </div>
                    </div>
                </div>
                
                <div class="chat-compose-area">
                    <form class="chat-compose-form" th:action="@{/messages/send}" method="post">
                        <input type="hidden" name="conversationId" th:value="${selectedConversationId}">
                        <input type="text" name="text" th:placeholder="#{messages.compose.placeholder}" required maxlength="2000" class="chat-input-modern" autocomplete="off">
                        <button type="submit" class="chat-send-btn" aria-label="Send">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            </th:block>
        </section>

    </div>
</main>

<script defer th:src="@{/js/ui.js}"></script>
<script defer th:src="@{/js/animations.js}"></script>
<script defer src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script defer th:src="@{/js/chat-messages.js}"></script>
</body>
</html>
