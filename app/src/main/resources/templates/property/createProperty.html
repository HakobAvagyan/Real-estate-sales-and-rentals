<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.property.create.title}">Create Property</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/animations.css}">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>
<main class="layout">
    <section class="panel" data-reveal>
        <h1 class="headline" th:text="#{property.create.headline}">Create Property</h1>
        <p class="subline" th:text="#{property.create.subline}">Fill in property details and upload one or more images.</p>

        <div th:if="${param.pendingReview}" class="success-note success-note-warn">
            <span th:text="#{property.create.pending}">Your listing was submitted for manager review. It will appear on the site after approval. You will get a notification if it is rejected.</span>
        </div>

        <div th:if="${param.successId}" class="success-note">
            <span th:text="#{property.create.success}">Property created successfully. ID:</span>
            <strong th:text="${param.successId}"></strong>
        </div>

        <form action="/user/property/create" method="post" enctype="multipart/form-data" class="grid">
            <label class="field row-full" th:text="#{property.create.field.title}">Title
                <input type="text" name="title" required>
            </label>

            <label class="field row-full" th:text="#{property.create.field.description}">Description
                <textarea name="description" rows="4" required></textarea>
            </label>

            <label class="field" th:text="#{property.create.field.surface}">Surface (m²)
                <input type="number" name="surface" min="1" required>
            </label>

            <label class="field" th:text="#{property.create.field.rooms}">Rooms Count
                <input type="number" name="roomsCount" min="0">
            </label>

            <label class="field" th:text="#{property.create.field.bathrooms}">Bathrooms Count
                <input type="number" name="bathroomsCount" min="0">
            </label>

            <label class="field" th:text="#{property.create.field.floorCount}">Building Floors Count
                <input type="number" name="floorCount" min="0">
            </label>

            <label class="field" th:text="#{property.create.field.floor}">Property Floor
                <input type="number" name="floor" min="0" required>
            </label>

            <label class="field" th:text="#{property.create.field.price}">Price
                <input type="number" name="price" min="0" step="0.01" required>
            </label>

            <label class="field" th:text="#{property.create.field.location}">Location
                <select name="locationNameId" required>
                    <option value="" th:text="#{property.create.selectRegionCity}">Select region and city</option>
                    <option th:each="locationName : ${locationNames}"
                            th:value="${locationName.id}"
                            th:text="${locationName.region + ', ' + locationName.city}">
                    </option>
                </select>
            </label>

            <label class="field" th:text="#{property.create.field.district}">District
                <input type="text" name="district" required>
            </label>

            <label class="field" th:text="#{property.create.field.street}">Street
                <input type="text" name="street" required>
            </label>

            <label class="field" th:text="#{property.create.field.status}">Status
                <select name="status" required>
                    <option value="" th:text="#{property.create.selectStatus}">Select status</option>
                    <option th:each="status : ${propertyStatuses}" th:value="${status}" th:with="statusKey=|enum.propertyStatus.${status}|"
                            th:text="#{__${statusKey}__}"></option>
                </select>
            </label>

            <label class="field" th:text="#{property.create.field.type}">Type
                <select name="propertyType" required>
                    <option value="" th:text="#{property.create.selectType}">Select type</option>
                    <option th:each="type : ${propertyTypes}" th:value="${type}" th:with="typeKey=|enum.propertyType.${type}|"
                            th:text="#{__${typeKey}__}"></option>
                </select>
            </label>

            <label class="field row-full" th:text="#{property.create.field.images}">Images
                <input type="file" class="form-control" name="images" multiple accept="image/*">
            </label>

            <div class="actions row-full">
                <button class="btn btn-primary" type="submit" th:text="#{create.property.submit}">Create</button>
                <a class="btn btn-ghost" href="/user/home" th:text="#{btn.back}">Back</a>
            </div>
        </form>
    </section>
</main>

<div th:replace="~{fragments/chatWidgets :: supportFab}"></div>

<script defer th:src="@{/js/ui.js}"></script>
<script defer th:src="@{/js/animations.js}"></script>
</body>
</html>
