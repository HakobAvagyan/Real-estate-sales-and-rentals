<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Change password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>
<main class="layout">
    <section class="panel">
        <h1 class="headline">Change Your Account password</h1>

        <div class="alert alert-warn" th:if="${msg} != null" th:text="${msg}"></div>


        <form method="post" th:action="@{/change/password}">
            <div class="grid">
                <div class="field row-full">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email" th:value="${email}" readonly>
                </div>
                <div class="field row-full">
                    <label  for="oldPassword">Old password</label>
                    <input  id="oldPassword" type="password" name="oldPassword" placeholder="Enter old password" required>
                    <label for="newPassword">New password</label>
                    <input id="newPassword" type="password" name="newPassword" placeholder="Enter new password" required>
                    <label  for="confirmPassword">New password again</label>
                    <input  id="confirmPassword" type="password" name="confirmPassword" placeholder="Enter confirm password" required>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit">Change password</button>
                <a class="btn btn-ghost" th:href="@{/home}">Back to Home</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
