<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{pwd.page.title}">Change password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>
<main class="layout">
    <section class="panel">
        <h1 class="headline" th:text="#{pwd.main.headline}">Change Your Account password</h1>

        <div class="alert alert-warn" th:if="${msg} != null" th:text="${msg}"></div>


        <form method="post" th:action="@{/change/password}">
            <div class="grid">
                <div class="field row-full">
                    <label for="email" th:text="#{pwd.email}">Email</label>
                    <input id="email" type="email" name="email" th:value="${email}" readonly>
                </div>
                <div class="field row-full">
                    <label  for="oldPassword" th:text="#{pwd.old}">Old password</label>
                    <input  id="oldPassword" type="password" name="oldPassword" th:placeholder="#{pwd.placeholder.old}" required>
                    <label for="newPassword" th:text="#{pwd.new}">New password</label>
                    <input id="newPassword" type="password" name="newPassword" th:placeholder="#{pwd.placeholder.new}" required>
                    <label  for="confirmPassword" th:text="#{pwd.confirm}">New password again</label>
                    <input  id="confirmPassword" type="password" name="confirmPassword" th:placeholder="#{pwd.placeholder.confirm}" required>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" type="submit" th:text="#{pwd.submit}">Change password</button>
                <a class="btn btn-ghost" th:href="@{/home}" th:text="#{pwd.backHome}">Back to Home</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
