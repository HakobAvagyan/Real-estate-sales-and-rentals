<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<main class="layout">
    <section class="panel">
        <h1 class="headline">Reset Password</h1>
        <p class="subline">Enter your email and we will send you a verification code.</p>

        <div class="alert alert-warn" th:if="${msg} != null" th:text="${msg}"></div>

        <form method="post" action="/reset/password/byEmail" class="grid">
            <div class="field row-full">
                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="example@gmail.com" required>
            </div>
            <div class="actions row-full">
                <button class="btn btn-primary" type="submit">Send Code</button>
                <a class="btn btn-ghost" th:href="@{/home}">Back</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
