<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Reset Password Form</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>
<main class="layout">
  <section class="panel">
    <h1 class="headline">Verify Your Account</h1>
    <p class="subline">Please enter the verification code sent to your email address.</p>

    <form method="post" th:action="@{/verify/password/reset}">
      <div class="grid">
        <div class="field row-full">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" th:value="${email}" readonly>
        </div>
        <div class="field row-full">
          <label for="verifyCode">Verification Code</label>
          <input id="verifyCode" type="text" name="verifyCode" placeholder="Enter 4-digit code" maxlength="4" pattern="[0-9]{4}" required inputmode="numeric">
          <small class="info-note">Enter the 4-digit code you received via email</small>
        </div>
        <div class="field row-full">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password" name="newPassword" placeholder="Enter new password" required>
        </div>
        <div class="field row-full">
          <label for="confirmPassword">Confirm New Password</label>
          <input id="confirmPassword" type="password" name="confirmPassword" placeholder="Confirm new password" required>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="submit">Reset Password</button>
        <a class="btn btn-ghost" th:href="@{/home}">Back to Home</a>
      </div>
    </form>
  </section>
</main>
</body>
</html>
