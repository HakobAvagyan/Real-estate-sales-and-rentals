<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="#{page.resetPassword.title}">Reset Password</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/siteHeader :: siteHeader}"></div>
<main class="layout">
  <section class="panel">
    <h1 class="headline" th:text="#{verify.headline}">Verify Your Account</h1>
    <p class="subline" th:text="#{verify.subline}">Please enter the verification code sent to your email address.</p>

    <form method="post" th:action="@{/verify/password/reset}">
      <div class="grid">
        <div class="field row-full">
          <label for="email" th:text="#{pwd.email}">Email</label>
          <input id="email" type="email" name="email" th:value="${email}" readonly>
        </div>
        <div class="field row-full">
          <label for="verifyCode" th:text="#{verify.code}">Verification Code</label>
          <input id="verifyCode" type="text" name="verifyCode" placeholder="Enter 4-digit code" maxlength="4" pattern="[0-9]{4}" required inputmode="numeric">
          <small class="info-note" th:text="#{verify.code.hint}">Enter the 4-digit code you received via email</small>
        </div>
        <div class="field row-full">
          <label for="newPassword" th:text="#{pwd.new}">New Password</label>
          <input id="newPassword" type="password" name="newPassword" th:placeholder="#{pwd.placeholder.new}" required>
        </div>
        <div class="field row-full">
          <label for="confirmPassword" th:text="#{pwd.confirm}">Confirm New Password</label>
          <input id="confirmPassword" type="password" name="confirmPassword" th:placeholder="#{pwd.placeholder.confirm}" required>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="submit" th:text="#{pwd.reset.button}">Reset Password</button>
        <a class="btn btn-ghost" th:href="@{/home}" th:text="#{pwd.backHome}">Back to Home</a>
      </div>
    </form>
  </section>
</main>
</body>
</html>
